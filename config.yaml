# HKEX 公告下载器配置文件

# API端点配置
api_endpoints:
  base_url: "https://www1.hkexnews.hk"
  stock_search: "/search/prefix.do"
  title_search: "/search/titleSearchServlet.do"
  referer: "https://www1.hkexnews.hk/search/titlesearch.xhtml?lang=zh"
  callback_param: "callback"
  market: "SEHK"
  
# 错误处理配置
error_handling:
  api_error_fallback: null  # API错误时的返回值，可配置为null或其他默认值
  retry_on_error: true
  max_retries: 3
  
# 基本设置
settings:
  save_path: "./hkexann"
  filename_length: 1000
  language: "zh"
  max_results: 1000
  verbose_logging: true
  log_file: "hkex_downloader.log"

# 默认日期范围设置
date_range:
  start_date: "2024-01-01"
  end_date: "today"

# 下载任务配置
download_tasks:
  - name: "默认下载任务"
    stock_code: '00700'
    start_date: "2025-01-15"
    end_date: "2025-01-17"
    keywords: []
    enabled: false  # 启用用于测试

  - name: "批量股票下载任务"
    stock_code: [ '02699', '00328']  # 添加测试股票00328
    start_date: "2024-01-01"
    end_date: "today"
    keywords: []
    enabled: true  # 启用批量任务用于测试

  - name: "数据库活跃股票任务"
    from_database: true              # 从数据库获取股票列表
    query: null                      # null表示使用默认查询，或自定义SQL查询
    start_date: "2024-01-01"
    end_date: "today"
    keywords: []
    enabled: false
    # 数据库任务特有配置
    database_config:
      batch_size: 50                 # 每批处理的股票数量
      delay_between_batches: 5       # 批次间延迟(秒)
      skip_on_error: true            # 单个股票失败时是否跳过继续处理

# 常用搜索关键字预设 - 用于主分类识别
common_keywords:
  # 关键字分类配置 - 用作主分类
  # 高优先级事件（特殊企业行为）
  discloseable_transaction:
    chinese: ["須予披露的交易", "须予披露的交易"]
    english: ["Discloseable Transaction"]
    folder_name: "须予披露交易"
    priority: 20
    weight: 0.2
    
  ipo:
    chinese: ["首次公開發售", "首次公开发行", "新股上市", "IPO"]
    english: ["Initial Public Offering", "IPO", "Public Offering"]
    folder_name: "IPO"
    priority: 90  # 最高优先级
    weight: 1.0
    
  privatization:
    chinese: ["私有化", "除牌", "退市"]
    english: ["Privatization", "Going Private", "Delisting"]
    folder_name: "私有化"
    priority: 85
    weight: 1.0

  full_buyout:
    chinese: ["全購", "全面收購", "強制性收購"]
    english: ["Full Buyout", "Mandatory Offer", "General Offer"]
    folder_name: "全购"
    priority: 80
    weight: 1.0

  # 中高优先级事件（股本变动）
  reverse_stock_split:
    chinese: ["合股", "股份合併", "股票合併", "資本重組", "股本重組", "建議股本重組"]
    english: ["Reverse Stock Split", "Share Consolidation", "Stock Consolidation", "Capital Reorganization"]
    folder_name: "合股"
    priority: 75
    weight: 0.9
  
  stock_split:
    chinese: ["拆股", "股份分拆", "股票分割"]
    english: ["Stock Split", "Share Split", "Stock Subdivision"]
    folder_name: "拆股"
    priority: 70
    weight: 0.9

  # 中等优先级事件（融资活动）
  rights_issue:
    chinese: ["供股", "權利股", "認股權"]
    english: ["Rights Issue", "Rights Offering", "Rights"]
    folder_name: "供股"
    priority: 60
    weight: 0.8

  placing:
    chinese: ["配股", "配售", "股份配售"]
    english: ["Placing", "Share Placing", "Equity Placing"]
    folder_name: "配股"
    priority: 55
    weight: 0.8

  convertible_bonds:
    chinese: ["可转换", "可轉換", "轉換債券", "可換股債券"]
    english: ["Convertible Bonds", "Convertible", "Convertible Securities"]
    folder_name: "可转换"
    priority: 50
    weight: 0.7

  # 较低优先级事件（股份操作）
  share_buyback:
    chinese: ["回購", "股份回購", "購回股份", "購回"]
    english: ["Share Buyback", "Buyback", "Share Repurchase", "Repurchase"]
    folder_name: "回购"
    priority: 40
    weight: 0.6

  # 交易暂停/复牌事件
  trading_halt:
    chinese: ["暫停買賣", "暂停买卖", "停牌", "短暫停牌"]
    english: ["Trading Halt", "Suspension", "Trading Suspension"]
    folder_name: "停牌"
    priority: 65
    weight: 0.8

  trading_resumption:
    chinese: ["復牌", "复牌", "恢復買賣", "恢复买卖"]
    english: ["Trading Resumption", "Resumption"]
    folder_name: "复牌"
    priority: 65
    weight: 0.8


# 公告分类配置（现已改为纯净LONG_TEXT分类）
# 说明：系统现在直接使用港交所官方LONG_TEXT作为分类结果，不进行任何映射
announcement_categories:
  enabled: true  # 是否启用公告分类功能
  # 排除的分类列表（这些分类的公告将不会被下载）
  excluded_categories:
    - "翌日披露報表"
    - "展示文件"
    - "月報表"

# 数据库配置
database:
  enabled: true
  host: "localhost"
  port: 3306
  user: "root"
  password: "${DB_PASSWORD}"  # 从环境变量DB_PASSWORD读取，避免硬编码敏感信息
  database: "ccass"
  default_table: "issue"
  fields:
    stock_code: "stockCode"
    stock_name: "stockName"
    status: "status"
    issue_id: "issueID"
  status_filter: ["normal"]  # 可选状态：normal, parallel, parallel_end
  connection:
    charset: "utf8mb4"
    autocommit: true
    connect_timeout: 30
    read_timeout: 30
    max_retries: 3

# ClickHouse股票发现配置 - 默认启用
stock_discovery:
  enabled: true  # 默认启用ClickHouse作为股票发现数据源
  stock_list_source: "clickhouse"  # 股票列表来源选择：clickhouse(从ClickHouse读取) 或 custom(自定义列表)
  host: "localhost"
  port: 8124  # ClickHouse HTTP端口
  database: "hkex_analysis"
  user: "root"
  password: "123456"  # 直接配置密码
  query_timeout: 60
  batch_size: 1000
  connection_timeout: 30
  max_retries: 3
  
  # 自定义股票列表配置 (当stock_list_source为"custom"时使用)
  custom_stocks:
    # 可直接配置股票代码列表
    stock_codes: ['00328' ]
    # 或从文件读取
    from_file: null  # 指向股票代码文件的路径，每行一个代码
    # 从MySQL数据库读取
    from_database: false  # 是否从数据库读取股票列表

# 守护者进程配置
daemon:
  enabled: true                     # 是否启用守护者进程模式
  schedule:
    # 定时任务配置 - 支持多个时间点
    times: ["09:00", "18:00"]       # 每天执行时间 (24小时制)
    # 或者使用 cron 表达式 (高级用法)
    # cron: "0 9,18 * * *"          # 每天9点和18点执行

  # 守护者进程运行配置
  runtime:
    check_interval: 60              # 检查调度间隔 (秒)
    max_retries: 3                  # 任务失败最大重试次数
    retry_delay: 300                # 重试间隔 (秒)
    log_level: "INFO"               # 守护者进程日志级别

  # 进程管理
  process:
    pid_file: "hkex_daemon.pid"     # PID文件路径
    log_file: "hkex_daemon.log"     # 守护者进程专用日志文件
    working_dir: "."                # 工作目录

  # 任务配置
  tasks:
    # 默认执行所有启用的下载任务
    run_all_enabled: true
    # 或者指定特定任务名称
    specific_tasks: []
    # 是否在启动时立即执行一次
    run_on_startup: false
    # 增量下载模式 - 只下载最新的公告
    incremental_mode: true
    # 增量下载的天数范围 (从今天往前推几天)
    incremental_days: 7

    # 数据库任务特殊配置
    database_tasks:
      # 是否在每次执行前刷新数据库连接
      refresh_connection: true
      # 数据库查询超时时间(秒)
      query_timeout: 30
      # 是否显示详细的股票处理进度
      show_progress: true

  # 监控和通知 (未来扩展)
  monitoring:
    enabled: false
    email_notifications: false
    webhook_url: ""

# 异步下载配置
async:
  enabled: true                     # 是否启用异步下载
  max_concurrent: 5                # 最大并发数（同时下载的文件数）
  requests_per_second: 5           # 每秒最大请求数（速率限制）
  timeout: 30                        # 单个请求超时时间（秒）
  min_delay: 0.88                     # 请求间最小延迟（秒）
  max_delay: 2.68                     # 请求间最大延迟（秒）
  backoff_on_429: 60                 # 收到429状态码时的等待时间（秒）

  # 休息功能配置（防止被封禁）
  rest:
    enabled: true                     # 是否启用休息功能
    work_minutes: 30                  # 工作时长（分钟）
    rest_minutes: 5                   # 休息时长（分钟）

# 高级设置
advanced:
  retry_attempts: 3
  request_delay: 1.68
  timeout: 30
  overwrite_existing: false
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.67 Safari/537.36"

# 双重过滤器配置
dual_filter:
  stock_filter_enabled: true              # 启用股票过滤（只保留监控股票列表中的股票）
  type_filter_enabled: true               # 启用类型过滤（按公告类型筛选）
