# 公告分类配置（已简化）
announcement_categories:
  enabled: true  # 是否启用公告分类功能

# HKEX官方分类系统配置
classification:
  use_hkex_official: true                # 启用HKEX官方三级分类系统
  hkex_confidence_threshold: 0.4         # HKEX官方分类置信度阈值（降低以减少分类失败）
  fallback_to_keyword: true              # 启用关键字分类回退（作为官方分类的补充）

  # 数据源配置
  data_source: "csv"                     # 数据源类型：csv(CSV文件) 或 api(在线API)
  csv_classification_file: "HKEX--分类信息-20250926.csv"  # CSV分类文件路径
  disable_online_update: true            # 禁用在线更新功能

# 数据库配置
database:
  enabled: true
  host: "localhost"
  port: 3306
  user: "root"
  password: "${DB_PASSWORD}"  # 从环境变量DB_PASSWORD读取，避免硬编码敏感信息
  database: "ccass"
  default_table: "issue"
  fields:
    stock_code: "stockCode"
    stock_name: "stockName"
    status: "status"
    issue_id: "issueID"
  status_filter: ["normal"]  # 可选状态：normal, parallel, parallel_end
  connection:
    charset: "utf8mb4"
    autocommit: true
    connect_timeout: 30
    read_timeout: 30
    max_retries: 3

# ClickHouse股票发现配置 - 默认启用
stock_discovery:
  enabled: true  # 默认启用ClickHouse作为股票发现数据源
  stock_list_source: "custom"  # 股票列表来源选择：clickhouse(从ClickHouse读取) 或 custom(自定义列表)
  host: "localhost"
  port: 8124  # ClickHouse HTTP端口
  database: "hkex_analysis"
  user: "root"
  password: "123456"  # 直接配置密码
  query_timeout: 60
  batch_size: 1000
  connection_timeout: 30
  max_retries: 3
  
  # 自定义股票列表配置 (当stock_list_source为"custom"时使用)
  custom_stocks:
    # 可直接配置股票代码列表
    stock_codes : ['03800']

    # 或从文件读取
    from_file: null  # 指向股票代码文件的路径，每行一个代码
    # 从MySQL数据库读取
    from_database: false  # 是否从数据库读取股票列表

# 异步下载配置
async:
  enabled: true                     # 是否启用异步下载
  max_concurrent: 5                # 最大并发数（同时下载的文件数）
  requests_per_second: 5           # 每秒最大请求数（速率限制）
  timeout: 30                        # 单个请求超时时间（秒）
  min_delay: 0.88                     # 请求间最小延迟（秒）
  max_delay: 2.68                     # 请求间最大延迟（秒）
  backoff_on_429: 60                 # 收到429状态码时的等待时间（秒）

  # 休息功能配置（防止被封禁）
  rest:
    enabled: true                     # 是否启用休息功能
    work_minutes: 30                  # 工作时长（分钟）
    rest_minutes: 5                   # 休息时长（分钟）

# 高级设置
advanced:
  retry_attempts: 3
  request_delay: 1.68
  timeout: 30
  overwrite_existing: false
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.67 Safari/537.36"

# 简化公告过滤配置 - 暂时禁用，使用HKEX官方分类代替
announcement_filter:
  stock_filter_enabled: false             # 禁用股票过滤（使用HKEX官方分类代替）
  type_filter_enabled: false              # 禁用类型过滤（使用HKEX官方分类代替）

  # 排除的公告类型（这些类型的公告将被过滤掉）
  excluded_categories:
    - "翌日披露報表"           # 日报类公告
    - "展示文件"              # 展示文件
    - "月報表"                # 月报
    - "股东大会"              # 股东大会
    - "更换董事"              # 董事变更
    - "更換董事"              # 董事变更（繁体）
    - "海外監管公告"          # 海外监管
    - "末期業績"              # 年报业绩
    - "盈利警告"              # 盈利警告

  # 必须包含的关键字（只保留包含这些关键字的公告）
  # 如果列表为空，则不进行包含过滤
  included_keywords:
    - "中期/半年度報告"        # 中期报告
    - "半年度報告"            # 半年度报告
    - "中期報告"              # 中期报告
    # IPO相关
    - "首次公開發售"          # 首次公开招股
    - "IPO"                   # IPO
    # 企业行动
    - "私有化"                # 私有化
    - "全購"                  # 全购
    - "合股"                  # 合股
    - "供股"                  # 供股
    - "回購"                  # 股份回购
    - "停牌"                  # 停牌
    - "復牌"                  # 复牌

# 🆕 新增股票历史处理配置
new_stock_historical_processing:
  enabled: true                    # 启用新增股票历史处理
  days: 3                         # 历史公告查询天数
  batch_size: 5                   # 单批处理股票数量  
  max_concurrent: 2               # 最大并发处理数
  timeout_minutes: 10             # 单批处理超时时间
  max_retries: 2                  # 最大重试次数
  enable_filtering: true          # 启用公告过滤
  auto_start: true               # 检测到新股票时自动启动