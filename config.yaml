# 数据库配置
database:
  enabled: true
  host: "localhost"
  port: 3306
  user: "root"
  password: "20251688Ma.."
  database: "ccass"
  default_table: "issue"
  fields:
    stock_code: "stockCode"
    stock_name: "stockName"
    status: "status"
    issue_id: "issueID"
  status_filter: ["normal"]  # 可选状态：normal, parallel, parallel_end
  connection:
    charset: "utf8mb4"
    autocommit: true
    connect_timeout: 30
    read_timeout: 30
    max_retries: 3

# 守护者进程配置
daemon:
  enabled: true                     # 是否启用守护者进程模式
  schedule:
    # 定时任务配置 - 支持多个时间点
    times: ["09:00", "18:00"]       # 每天执行时间 (24小时制)
    # 或者使用 cron 表达式 (高级用法)
    # cron: "0 9,18 * * *"          # 每天9点和18点执行

  # 守护者进程运行配置
  runtime:
    check_interval: 60              # 检查调度间隔 (秒)
    max_retries: 3                  # 任务失败最大重试次数
    retry_delay: 300                # 重试间隔 (秒)
    log_level: "INFO"               # 守护者进程日志级别

  # 进程管理
  process:
    pid_file: "hkex_daemon.pid"     # PID文件路径
    log_file: "hkex_daemon.log"     # 守护者进程专用日志文件
    working_dir: "."                # 工作目录

  # 任务配置
  tasks:
    # 默认执行所有启用的下载任务
    run_all_enabled: true
    # 或者指定特定任务名称
    specific_tasks: []
    # 是否在启动时立即执行一次
    run_on_startup: false
    # 增量下载模式 - 只下载最新的公告
    incremental_mode: true
    # 增量下载的天数范围 (从今天往前推几天)
    incremental_days: 7

    # 数据库任务特殊配置
    database_tasks:
      # 是否在每次执行前刷新数据库连接
      refresh_connection: true
      # 数据库查询超时时间(秒)
      query_timeout: 30
      # 是否显示详细的股票处理进度
      show_progress: true

  # 监控和通知 (未来扩展)
  monitoring:
    enabled: false
    email_notifications: false
    webhook_url: ""

# 异步下载配置
async:
  enabled: true                     # 是否启用异步下载
  max_concurrent: 3                # 最大并发数（同时下载的文件数）
  requests_per_second: 3             # 每秒最大请求数（速率限制）
  timeout: 30                        # 单个请求超时时间（秒）
  min_delay: 1.68                     # 请求间最小延迟（秒）
  max_delay: 2.68                     # 请求间最大延迟（秒）
  backoff_on_429: 60                 # 收到429状态码时的等待时间（秒）

  # 休息功能配置（防止被封禁）
  rest:
    enabled: true                     # 是否启用休息功能
    work_minutes: 30                  # 工作时长（分钟）
    rest_minutes: 5                   # 休息时长（分钟）

# 高级设置
advanced:
  retry_attempts: 3
  request_delay: 1.68
  timeout: 30
  overwrite_existing: false
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.67 Safari/537.36"