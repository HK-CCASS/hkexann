# HKEX 公告下载器配置文件模板
# 复制此文件为 config.yaml 并修改相应设置

# 基本设置
settings:
  # 下载文件保存的根目录路径
  save_path: "C:/Users/Administrator/Desktop"
  
  # 下载文件名的最大长度（字符数）
  filename_length: 220
  
  # 语言设置：zh（中文）或 en（英文）
  language: "zh"
  
  # 每次搜索返回的最大结果数
  max_results: 500
  
  # 是否启用详细日志输出
  verbose_logging: true
  
  # 日志文件路径（可选，不设置则只输出到控制台）
  log_file: "hkex_downloader.log"

# 默认日期范围设置
date_range:
  # 默认开始日期（格式：YYYY-MM-DD，或使用相对日期）
  start_date: "2024-01-01"
  
  # 默认结束日期（格式：YYYY-MM-DD，today表示今天）
  end_date: "today"
  
  # 相对日期设置（与 start_date/end_date 二选一）
  # 如：下载最近30天的公告
  # relative_days: 30

# 下载任务配置（支持批量下载多个股票）
download_tasks:
  # 任务1：下载指定股票的所有公告
  - name: "中华煤气公告下载"
    stock_code: "00003"
    start_date: "2024-01-01"
    end_date: "today"
    keywords: []  # 空数组表示下载所有公告
    enabled: true
    
  # 任务2：下载指定关键字的公告
  - name: "中华煤气财务报告"
    stock_code: "00003"
    start_date: "2024-01-01"
    end_date: "today"
    keywords: ["財務報告", "年報", "中期報告"]
    enabled: false
    
  # 任务3：批量下载多个股票
  - name: "蓝筹股公告"
    stock_codes: ["00001", "00002", "00003", "00005"]  # 支持多个股票代码
    start_date: "2024-06-01"
    end_date: "today"
    keywords: ["業績", "分派"]
    enabled: false
    
  # 任务4：从数据库读取股票列表
  - name: "数据库股票公告"
    from_database: true
    query: "SELECT stockCode FROM issue WHERE status = 'normal'"  # 自定义SQL查询
    start_date: "2024-01-01"
    end_date: "today"
    keywords: []
    enabled: false

# 常用搜索关键字预设
common_keywords:
  financial_reports: ["財務報告", "年報", "中期報告", "季報"]
  announcements: ["業績", "分派", "股息", "配股"]
  corporate_actions: ["合併", "收購", "重組", "分拆"]
  regulatory: ["須予披露", "關連交易", "內幕消息"]

# 公告分类配置（基于港交所官方分类）
# 启用后，公告将按类型自动分类保存到不同文件夹
announcement_categories:
  enabled: true  # 是否启用公告分类功能
  
  # 01_业绩报告 - 财务相关公告
  "01_业绩报告":
    "年报":
      keywords: ["年報", "年报", "Annual Report", "全年業績", "全年业绩"]
      priority: 1
    "中期报告":
      keywords: ["中期報告", "中期报告", "Interim Report", "半年", "中期業績"]
      priority: 1
    "季报":
      keywords: ["季報", "季报", "Quarterly", "第一季", "第二季", "第三季", "第四季"]
      priority: 1
    "业绩公告":
      keywords: ["業績公告", "业绩公告", "業績", "业绩", "盈利警告", "Profit Warning"]
      priority: 2
  
  # 02_交易公告 - 重大交易相关
  "02_交易公告":
    "须予披露交易":
      keywords: ["須予披露交易", "须予披露交易", "Notifiable Transaction", "主要交易"]
      priority: 1
    "关连交易":
      keywords: ["關連交易", "关连交易", "Connected Transaction", "持續關連交易"]
      priority: 1
    "收购合并":
      keywords: ["收購", "收购", "合併", "合并", "Acquisition", "Merger", "出售"]
      priority: 1
  
  # 03_公司管治 - 公司治理相关
  "03_公司管治":
    "股东大会":
      keywords: ["股東大會", "股东大会", "股東週年大會", "AGM", "投票結果", "EGM"]
      priority: 1
    "董事会决议":
      keywords: ["董事", "Director", "董事名單", "董事變更", "委任", "辭任", "董事會"]
      priority: 1
    "权益披露":
      keywords: ["權益披露", "权益披露", "Disclosure of Interest", "權益變動"]
      priority: 1
  
  # 04_业务发展 - 业务运营相关
  "04_业务发展":
    "业务公告":
      keywords: ["業務發展", "业务发展", "Business Development", "營運數據", "运营数据"]
      priority: 2
    "通告公告":
      keywords: ["通告", "公告", "Announcement", "澄清", "回應", "回应"]
      priority: 3
  
  # 05_监管报告 - 监管要求的报告
  "05_监管报告":
    "月报表":
      keywords: ["月報表", "月报表", "Monthly Return", "證券變動", "证券变动"]
      priority: 1
    "上市文件":
      keywords: ["上市文件", "Listing Document", "招股書", "招股书"]
      priority: 1
  
  # 06_交易状态 - 交易状态变更
  "06_交易状态":
    "交易暂停":
      keywords: ["交易暫停", "交易暂停", "Suspension", "暫停買賣"]
      priority: 1
    "恢复交易":
      keywords: ["恢復交易", "恢复交易", "Resumption", "復牌"]
      priority: 1
  
  # 07_股息分派 - 股息和分派相关
  "07_股息分派":
    "股息公告":
      keywords: ["股息", "分派", "派息", "Dividend", "Distribution"]
      priority: 1
    "红股配股":
      keywords: ["紅股", "红股", "配股", "Rights Issue", "Bonus Issue"]
      priority: 1
  
  # 08_其他 - 未分类的公告
  "08_其他":
    "其他":
      keywords: ["其他", "Other", "雜項", "杂项"]
      priority: 10

# 数据库配置（可选）
database:
  # 是否启用数据库功能
  enabled: false
  
  # 数据库连接参数
  host: "localhost"
  port: 3306
  user: "root"
  password: ""
  database: "ccass"
  
  # 默认股票表配置（适配issue表结构）
  default_table: "issue"
  
  # 字段映射（根据issue表结构调整）
  fields:
    stock_code: "stockCode"   # 股票代码字段名（varchar(8)）
    stock_name: "stockName"   # 股票名称字段名（varchar(255)）
    status: "status"          # 股票状态字段名（enum: normal/parallel/parallel_end）
    issue_id: "issueID"       # 问题ID字段名（bigint，关联stocklistings表）
  status_filter: ["normal"]   # 状态过滤器（可选：normal/parallel/parallel_end）
  
  # 连接设置
  connection:
    charset: "utf8mb4"
    autocommit: true
    connect_timeout: 30
    read_timeout: 30
    max_retries: 3

# 高级设置
advanced:
  # 下载重试次数
  retry_attempts: 3
  
  # 请求间隔时间（秒）
  request_delay: 1
  
  # 超时设置（秒）
  timeout: 30
  
  # 是否覆盖已存在的文件
  overwrite_existing: false
  
  # 用户代理字符串（一般不需要修改）
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.67 Safari/537.36" 